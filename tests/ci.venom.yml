      - type: exec
        script: bash {{.root}}/.claude/skills/taskfile/lint.sh {{.root}}/tests/fixtures/bad-no-list
        assertions:
          - result.code ShouldEqual 1
          - result.systemout ShouldContainSubstring "default task lists tasks"

  - name: bad-bare-include detected by lint
