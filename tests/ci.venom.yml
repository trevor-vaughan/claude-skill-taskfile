      - type: exec
        script: bash {{.root}}/.claude/skills/taskfile/lint.sh {{.root}}/tests/fixtures/bad-no-default
        assertions:
          - result.code ShouldEqual 1
          - result.systemout ShouldContainSubstring "default is first task"

  - name: bad-default-not-first detected by lint
    steps:
      - type: exec
        script: bash {{.root}}/.claude/skills/taskfile/lint.sh {{.root}}/tests/fixtures/bad-default-not-first
        assertions:
          - result.code ShouldEqual 1
          - result.systemout ShouldContainSubstring "first task"

  - name: bad-no-doc-comments detected by lint
    steps:
      - type: exec
        script: bash {{.root}}/.claude/skills/taskfile/lint.sh {{.root}}/tests/fixtures/bad-no-doc-comments
        assertions:
          - result.code ShouldEqual 1
          - result.systemout ShouldContainSubstring "missing on:"

  - name: bad-no-list detected by lint
