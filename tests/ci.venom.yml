name: CI test suite for Taskfile lint and parse checks
vars:
  root: "."

testcases:
  - name: Lint script exists and is runnable
    steps:
      - type: exec
        script: test -f {{.root}}/.claude/skills/taskfile/lint.sh
        assertions:
          - result.code ShouldEqual 0
      - type: exec
        script: bash -n {{.root}}/.claude/skills/taskfile/lint.sh
        assertions:
          - result.code ShouldEqual 0

  - name: Self-lint passes on project root
    steps:
      - type: exec
        script: bash {{.root}}/.claude/skills/taskfile/lint.sh {{.root}}
        assertions:
          - result.code ShouldEqual 0

  - name: Task parse validation
    steps:
      - type: exec
        script: cd {{.root}} && task --list
        assertions:
          - result.code ShouldEqual 0
      - type: exec
        script: cd {{.root}} && task dev --list
        assertions:
          - result.code ShouldEqual 0
      - type: exec
        script: cd {{.root}} && task eval --list
        assertions:
          - result.code ShouldEqual 0

  - name: Good fixtures pass lint
    steps:
      - type: exec
        script: bash {{.root}}/.claude/skills/taskfile/lint.sh {{.root}}/tests/fixtures/good-single
        assertions:
          - result.code ShouldEqual 0
      - type: exec
        script: bash {{.root}}/.claude/skills/taskfile/lint.sh {{.root}}/tests/fixtures/good-multi
        assertions:
          - result.code ShouldEqual 0

  - name: bad-lowercase detected by lint
    steps:
      - type: exec
        script: bash {{.root}}/.claude/skills/taskfile/lint.sh {{.root}}/tests/fixtures/bad-lowercase
        assertions:
          - result.code ShouldEqual 1
          - result.systemout ShouldContainSubstring "found lowercase"

  - name: bad-no-header detected by lint
    steps:
      - type: exec
        script: bash {{.root}}/.claude/skills/taskfile/lint.sh {{.root}}/tests/fixtures/bad-no-header
        assertions:
          - result.code ShouldEqual 1
          - result.systemout ShouldContainSubstring "version:"

  - name: bad-no-default detected by lint
