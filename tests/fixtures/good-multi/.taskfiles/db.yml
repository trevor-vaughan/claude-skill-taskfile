version: '3'

vars:
  DATABASE_URL: '{{.DATABASE_URL | default "postgres://localhost/webapp"}}'

tasks:
  default:
    silent: true
    cmd: task db --list

  migrate:
    desc: Run database migrations
    cmd: dbmate up

  reset:
    desc: Reset the database — DESTRUCTIVE
    prompt: This will drop and recreate the database. Are you sure?
    cmds:
      - dbmate drop
      - dbmate up
