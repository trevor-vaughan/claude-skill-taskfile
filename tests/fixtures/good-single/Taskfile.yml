version: '3'

includes:
  dev:
    taskfile: .taskfiles/dev.yml

vars:
  APP: '{{.APP | default "myapp"}}'

tasks:
  default:
    desc: List all available tasks
    silent: true
    cmd: task --list

  test:
    desc: Run tests (shortcut)
    cmds:
      - task: dev:test

  check:
    desc: Run all quality gates
    cmds:
      - task: dev:test
