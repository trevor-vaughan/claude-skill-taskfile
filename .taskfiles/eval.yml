version: '3'

vars:
  TEST_DIR: '{{.ROOT_DIR}}/{{.TEST_DIR | default ".test-output"}}'
  EVALS_DIR: '{{.ROOT_DIR}}/evals'

tasks:
  default:
    silent: true
    cmd: task eval --list

  test:
    desc: Run all LLM evals via Venom
    cmds:
      - mkdir -p "{{.TEST_DIR}}"
      - venom run "{{.EVALS_DIR}}/evals.venom.yml" --var root="{{.ROOT_DIR}}" --var test_dir="{{.TEST_DIR}}" --lib-dir "{{.EVALS_DIR}}/lib" --output-dir "{{.TEST_DIR}}"

  run:
    desc: "Run a single eval by ID (e.g. task eval:run -- 3)"
    requires:
      vars: [CLI_ARGS]
    vars:
      EVAL_DESC:
        sh: jq -r '.evals[] | select(.id == {{.CLI_ARGS}}) | .prompt | .[0:60]' "{{.EVALS_DIR}}/evals.json"
    cmds:
      - mkdir -p "{{.TEST_DIR}}"
      - venom run "{{.EVALS_DIR}}/eval-single.venom.yml" --var id="{{.CLI_ARGS}}" --var desc="{{.EVAL_DESC}}" --var root="{{.ROOT_DIR}}" --var test_dir="{{.TEST_DIR}}" --lib-dir "{{.EVALS_DIR}}/lib" --output-dir "{{.TEST_DIR}}"

  list:
    desc: List eval cases
    cmd: jq -r '.evals[] | "  \(.id). \(.prompt | .[0:80])..."' "{{.EVALS_DIR}}/evals.json"
