version: '3'

# dotenv: [".env"]

includes:
  dev:
    taskfile: .taskfiles/dev.yml

vars:
  APP_NAME: '{{.APP_NAME | default "myapp"}}'
  TEST_DIR: '{{.TEST_DIR | default ".test-output"}}'

tasks:
  default:
    silent: true
    cmd: |
      task --list 2>/dev/null | awk '
        /^task:/ { next }
        /^\* / {
          line = substr($0, 3)
          if (!match(line, /:[[:space:]]+/)) next
          name = substr(line, 1, RSTART - 1)
          desc = substr(line, RSTART + RLENGTH)
          gsub(/^[[:space:]]+/, "", desc)
          sep = index(name, ":")
          if (sep > 0) {
            ns = substr(name, 1, sep - 1)
            short = substr(name, sep + 1)
          } else {
            ns = ""
            short = name
          }
          if (short == "default") next
          idx++
          ns_arr[idx] = ns
          short_arr[idx] = short
          desc_arr[idx] = desc
          if (!(ns in ns_seen)) {
            ns_order[++ns_count] = ns
            ns_seen[ns] = 1
          }
        }
        END {
          for (o = 1; o <= ns_count; o++) {
            ns = ns_order[o]
            print ""
            print "----------"
            print (ns == "" ? "tasks" : ns) ":"
            for (i = 1; i <= idx; i++) {
              if (ns_arr[i] == ns) {
                printf "  %-24s %s\n", short_arr[i], desc_arr[i]
              }
            }
            print "----------"
          }
          print ""
        }
      '

  test:
    desc: "Alias for dev:test"
    cmds:
      - task: dev:test

  lint:
    desc: "Alias for dev:lint"
    cmds:
      - task: dev:lint

  build:
    desc: "Alias for dev:build"
    cmds:
      - task: dev:build

  check:
    desc: Run all quality gates
    deps: [lint, test]

  clean:
    desc: Remove build artifacts and test output
    cmd: rm -rf bin/ dist/ {{.TEST_DIR}}
